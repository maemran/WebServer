http {
    root ./www;
    client_max_body_size 100000;
    error_page 404 /errors/404.html;
    error_page 502 /errors/502.html;
    index index.html;

    server {
        listen 127.0.0.1:8080;
        
        location / {
            allowed_methods GET HEAD POST DELETE;
        }

        location /cgi {
            cgi .py /usr/bin/python3;
            cgi .sh /bin/bash;
            cgi .pl /usr/bin/perl;
        }
    }
}
