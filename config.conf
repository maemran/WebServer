http {
    client_max_body_size 20M;

    server {
        listen 127.0.0.1:8080;
        root /var/www/html;


        location /old-page {
            return 301 /new-page;
        }

        location /new-page {
            index index.html;
        }

        location /images {
            autoindex on;
        }

        location /uploads {
            allowed_method POST;
            root /var/tmp/files;
        }
    }

    server {
        listen  9090;

        location / {

            index index.html;
            allowed_method GET;
        }
    }
}