http {
    root ./www;
    client_max_body_size 20M;

    server {
        listen 127.0.0.1:8080;

        error_page 404 /errors/404.html;
        error_page 502 /errors/502.html;

        location /old-page {
            return 301 /new-page.html;
        }

        location /new-page.html {
            index index.html;
        }

        location /images {
            autoindex on;
        }

        location /uploads {
            allowed_methods POST;
            root ./www/uploads;
        }
    }

    server {
        listen 9090;

        location / {
            index index.html;
            allowed_methods GET;
        }
    }
}