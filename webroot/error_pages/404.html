<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Not Found</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:linear-gradient(135deg,#0f172a,#1e293b); color:#e2e8f0; font-family:Verdana,sans-serif; }
    .box { width:min(500px,90vw); padding:32px; border-radius:16px; text-align:center; background:#0b1224cc; border:1px solid #334155; box-shadow:0 10px 30px #00000055; }
    h1 { margin:0; font-size:88px; line-height:1; color:#38bdf8; }
    h2 { margin:8px 0 14px; font-size:28px; }
    p { margin:0 0 20px; color:#cbd5e1; }
  </style>
</head>
<body>
  <main class="box">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you requested does not exist or was moved.</p>
  </main>
</body>
</html>
