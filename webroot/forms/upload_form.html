<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Text – MyBlog</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

  <header>
    <a href="../index.html" class="logo-wrap">
      <div class="logo-icon">MB</div>
      <span class="logo-text">MyBlog</span>
    </a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="../blog/post1.html">Blog</a>
      <a href="../forms/contact_form.html">Contact</a>
      <a href="../forms/upload_form.html" class="active">Upload</a>
    </nav>
  </header>

  <main class="narrow">

    <div class="breadcrumb">
      <a href="../index.html">Home</a>
      <span>›</span>
      Upload
    </div>

    <div class="page-title-block">
      <h1>Submit Text</h1>
      <p>Send plain text content to the server.</p>
    </div>

    <form action="/cgi-bin/upload.py" method="POST" class="form-wrapper">

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.25rem;">
        <div class="field">
          <label for="uploader">Your Name</label>
          <input type="text" id="uploader" name="uploader" placeholder="Jane Doe" required>
        </div>
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com">
        </div>
      </div>

      <div class="field">
        <label for="description">Text Description</label>
        <input type="text" id="description" name="description" placeholder="Brief description of the text…">
      </div>

      <div class="field">
        <label for="textInput">Text Content</label>
        <textarea id="textInput" name="text" rows="10" placeholder="Write your text here..." required></textarea>
      </div>

      <div style="margin-bottom:1.5rem;">
        <div style="display:flex; justify-content:space-between; font-family:'Syne',sans-serif; font-size:.8rem; color:var(--muted); margin-bottom:4px;">
          <span>Characters</span>
          <span id="charCount">0</span>
        </div>
        <div style="background:var(--border); height:8px; border:1px solid var(--border);">
          <div id="charBar" style="background:var(--green); height:100%; width:0; transition:width .3s;"></div>
        </div>
      </div>

      <button type="submit" class="btn" id="uploadBtn">Submit Text →</button>

    </form>

  </main>

  <footer>
    <p>© 2025 MyBlog &nbsp;·&nbsp; <a href="../index.html">Home</a> &nbsp;·&nbsp; <a href="../forms/contact_form.html">Contact</a></p>
  </footer>

  <script>
    const textInput = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');
    const charBar = document.getElementById('charBar');
    const maxChars = 5000;

    function updateCount() {
      const len = textInput.value.length;
      charCount.textContent = String(len);
      const pct = Math.min(100, (len / maxChars) * 100);
      charBar.style.width = pct + '%';
    }

    textInput.addEventListener('input', updateCount);
    updateCount();
  </script>

</body>
</html>
